<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="styles.css">
<script type="module" src="app.js"></script>
</head>
<body>

<div class="auth-page">
<div class="auth-card">

<h2>Login</h2>

<p class="login-text">
Get Started 
</p>

<label class="label">UserName</label>
<input class="input" type="email" id="email" placeholder="User Name">

<label class="label">Password</label>
<input class="input" type="password" id="password" placeholder="Enter Password">

<button class="btn full-btn" onclick="TaskTracker.login()">
Login
</button>


</div>
</div>

</body>
</html>

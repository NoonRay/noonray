<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoonRay Task Tracker</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<script type="module" src="app.js"></script>
</head>
<body>

<div class="background-glow glow-1"></div>
<div class="background-glow glow-2"></div>

<nav class="navbar">
    <div class="logo">NoonRay<span> Energy</span></div>

    <button class="login-btn" onclick="window.location.href='login.html'">
        <i class="fa-solid fa-user"></i>
        Login
    </button>
</nav>

<section class="hero">
    <div class="hero-left">
        <h1>Welcome to <span>NoonRay</span></h1>
        <p class="hero-main-text">TaskFlow</p>
        <p class="hero-sub-text">
            Noonray is also deeply invested in upskilling through a range of technical training programs
        </p>
    </div>
</section>

<section class="dashboard-grid">

<div class="dashboard-card live-time">
    <div class="card-header">
        <h3><i class="fa-regular fa-clock"></i> Time & Date</h3>
    </div>

    <h1 id="clock"></h1>
    <p id="date"></p>

    <div class="holiday-section">
        <h4>Updates</h4>
        <ul id="holidayList"></ul>
    </div>
</div>

<div class="dashboard-card calendar-card">
    <div class="card-header">
        <h3 id="monthYear"></h3>
    </div>

    <div class="calendar-days">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
    </div>

    <div class="calendar-dates" id="calendarDates"></div>
</div>

</section>

<div class="marquee-container">
    <div class="marquee-text">
        🎉 NOONRAY ATHIVEL 🎉
    </div>
</div>

<div id="firecracker-container"></div>

</body>
</html>
